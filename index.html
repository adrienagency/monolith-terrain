<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShibuMap — quiet, living topographic maps</title>
    <meta
      name="description"
      content="Explore any place on Earth as an elegant 3D relief map. Vintage topographic styles, volumetric clouds, glass lakes, country cutouts — search a place, shape the look, export images and videos. Free, in your browser."
    />
    <link rel="canonical" href="https://shibumap.com/" />
    <meta name="theme-color" content="#f4f3f0" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShibuMap" />
    <meta property="og:title" content="ShibuMap — quiet, living topographic maps" />
    <meta
      property="og:description"
      content="Turn any place on Earth into an elegant 3D relief map. Search, style, explore — then export it as an image or a video."
    />
    <meta property="og:url" content="https://shibumap.com/" />
    <meta property="og:image" content="https://shibumap.com/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShibuMap — quiet, living topographic maps" />
    <meta
      name="twitter:description"
      content="Turn any place on Earth into an elegant 3D relief map. Search, style, explore — then export it as an image or a video."
    />
    <meta name="twitter:image" content="https://shibumap.com/og.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ShibuMap",
        "url": "https://shibumap.com/",
        "description": "Interactive 3D topographic maps of anywhere on Earth — vintage relief styles, volumetric clouds, glass lakes, administrative cutouts, image and video export.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web browser (desktop and tablet)",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
      }
    </script>
    <!-- ground-cartouche fonts: Rosarivo (titles) + Bricolage Grotesque (body).
         Bricolage's real wght axis is 200..800 (Google Fonts serves
         `font-weight: 200 800`; asking for 900 is a 400). We used to request
         only 300..700, which silently capped the map's city labels at 700 —
         they read too thin and no amount of `weight: 800` in canvas could fix
         it, because the face simply wasn't loaded that heavy. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rosarivo:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%2323201a' stroke-width='2.6'/%3E%3Ccircle cx='16' cy='16' r='5.5' fill='%23ff4d00'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <!-- Loader: no "hidden" class here on purpose — this whole card is inline
         markup + CSS so it paints on first byte, before style.css's webfonts
         swap in and long before the JS bundle (Three.js + the app) has even
         been fetched. main.js only ever ADDS the .hidden class once the real
         terrain is built (see loadingStatus/loadingEl in main.js) and never
         before a 2s-minimum has elapsed, so this can't flash. -->
    <div id="loading">
      <div class="ld-name">ShibuMap</div>
      <div class="ld-base">Any place on Earth, as a quiet relief map</div>
      <!-- small planet, tilted on its axis (axis drawn through it), spinning
           on itself — pure SVG/CSS, no image, no JS required to animate -->
      <svg class="ld-globe" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <radialGradient id="ldShade" cx="34%" cy="30%" r="78%">
            <stop offset="0%" stop-color="#fdfcf9"/>
            <stop offset="55%" stop-color="#ddd9cf"/>
            <stop offset="100%" stop-color="#a8a496"/>
          </radialGradient>
        </defs>
        <g class="ld-tilt">
          <line class="ld-axis" x1="32" y1="3" x2="32" y2="61"/>
          <circle class="ld-pole" cx="32" cy="4.5" r="1.1"/>
          <circle class="ld-pole" cx="32" cy="59.5" r="1.1"/>
          <circle class="ld-sphere" cx="32" cy="32" r="16.5" fill="url(#ldShade)"/>
          <ellipse class="ld-equator" cx="32" cy="32" rx="16.5" ry="5.2"/>
          <ellipse class="ld-merid ld-merid-1" cx="32" cy="32" rx="16.5" ry="16.5"/>
          <ellipse class="ld-merid ld-merid-2" cx="32" cy="32" rx="16.5" ry="16.5"/>
          <ellipse class="ld-merid ld-merid-3" cx="32" cy="32" rx="16.5" ry="16.5"/>
        </g>
      </svg>
      <div class="ld-status">generating terrain&hellip;</div>
    </div>
    <!-- timestamps the moment the loader actually painted, NOT when the JS
         bundle finishes booting — main.js reads this to enforce "at least 2s
         on screen" from the true start, so a fast connection never flashes it -->
    <script>window.__ldStart = performance.now()</script>
    <script type="module" src="/src/boot.js"></script>
  </body>
</html>
