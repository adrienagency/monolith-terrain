<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShibuMap — quiet, living topographic maps</title>
    <meta
      name="description"
      content="Explore any place on Earth as an elegant 3D relief map. Vintage topographic styles, volumetric clouds, glass lakes, country cutouts — search a place, shape the look, export images and videos. Free, in your browser."
    />
    <link rel="canonical" href="https://shibumap.com/" />
    <meta name="theme-color" content="#f4f3f0" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShibuMap" />
    <meta property="og:title" content="ShibuMap — quiet, living topographic maps" />
    <meta
      property="og:description"
      content="Turn any place on Earth into an elegant 3D relief map. Search, style, explore — then export it as an image or a video."
    />
    <meta property="og:url" content="https://shibumap.com/" />
    <meta property="og:image" content="https://shibumap.com/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShibuMap — quiet, living topographic maps" />
    <meta
      name="twitter:description"
      content="Turn any place on Earth into an elegant 3D relief map. Search, style, explore — then export it as an image or a video."
    />
    <meta name="twitter:image" content="https://shibumap.com/og.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ShibuMap",
        "url": "https://shibumap.com/",
        "description": "Interactive 3D topographic maps of anywhere on Earth — vintage relief styles, volumetric clouds, glass lakes, administrative cutouts, image and video export.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web browser (desktop and tablet)",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
      }
    </script>
    <!-- ground-cartouche fonts: Rosarivo (titles) + Bricolage Grotesque (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rosarivo:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%2323201a' stroke-width='2.6'/%3E%3Ccircle cx='16' cy='16' r='5.5' fill='%23ff4d00'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="loading" class="hidden">
      <div class="ld-name">ShibuMap</div>
      <div class="ld-base">Any place on Earth, as a quiet relief map</div>
      <div class="ld-track" aria-hidden="true">
        <svg class="ld-plane" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21.5 12.7c.8-.3.8-1.1 0-1.4l-5.9-1.9L9.3 2.9c-.4-.5-1-.4-1.2.2l1.6 6.1-5.2-.9-1.7-2.2c-.3-.4-.9-.3-.9.2l.6 3.9c.1.4.1.8 0 1.2l-.6 3.9c-.1.5.6.7.9.2l1.7-2.2 5.2-.9-1.6 6.1c.2.6.8.7 1.2.2l6.3-6.5 5.9-1.5z"/>
        </svg>
      </div>
      <div class="ld-status">generating terrain&hellip;</div>
    </div>
    <script type="module" src="/src/boot.js"></script>
  </body>
</html>
