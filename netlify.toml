# ShibuMap — Netlify config.
#
# Build/publish match the deploy command this project actually uses
# (see the task-21 report / README): `npx vite build && netlify deploy
# --prod --dir dist --site 74e18fe8-c86f-47ad-9807-479cd59f1d8c`.
#
# Functions: netlify/functions/race.mjs backs the `#r=<id>` share-link form
# (GPX-carrying links) via Netlify Blobs — see that file's own header for the
# full contract.

[build]
  command = "npx vite build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# /templates : l'ancienne vitrine statique est remplacée par la boutique
# in-app (décision Adrien 2026-07-23) — l'app s'ouvre en mode boutique.
# force=true : prime sur tout fichier statique résiduel. Les assets
# téléchargeables restent servis sous /templates/assets/, et le catalogue
# de la boutique sous /templates/data.json.
[[redirects]]
  from = "/templates"
  to = "/?store=1"
  status = 302
  force = true

[[redirects]]
  from = "/templates/"
  to = "/?store=1"
  status = 302
  force = true
